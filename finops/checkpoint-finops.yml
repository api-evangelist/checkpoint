specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Check Point
providerId: checkpoint
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Security
  - Cybersecurity
  - Network Security
  - Security
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Check Point: enterprise license + subscription model where API
  access is bundled into the underlying product license. Spend is tracked as discrete contractual line
  items (term subscriptions, support, professional services) rather than per-API-request usage.'
notes: Check Point does not expose a metered usage API for billing. FinOps shape below reflects the
  channel-quoted enterprise license model.
sources:
  - https://www.checkpoint.com/
  - https://www.checkpoint.com/products/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Check Point Software Technologies Ltd.
serviceCategory: Security
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Check Point
  ServiceCategory: Security
  ProviderName: Check Point
  PublisherName: Check Point Software Technologies Ltd.
  InvoiceIssuerName: Check Point Software Technologies Ltd.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
meters:
  - name: product_subscription
    description: Per-product term subscription line (Quantum, CloudGuard, Harmony, Infinity, Spark)
    unit: month
    aggregation: sum
    dimensions:
      - product
      - sku
      - region
  - name: gateway_throughput
    description: Throughput tier (Mbps / Gbps) attached to a Quantum gateway license
    unit: Mbps
    aggregation: max
    dimensions:
      - gateway
      - blade_set
  - name: protected_assets
    description: Endpoints, mailboxes, cloud assets, or users covered under Harmony / CloudGuard
      subscriptions
    unit: asset
    aggregation: sum
    dimensions:
      - product
      - environment
  - name: support_subscription
    description: Premium / Diamond / Elite support contract line
    unit: month
    aggregation: sum
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Track Check Point spend through Infinity Portal license inventory and the Check Point
      User Center; reconcile against partner invoices for term renewals.
  - name: Allocation
    description: Tag licenses by gateway, business unit, and environment in the Infinity Portal so
      cyber-security spend can be charged back to consuming organizations.
  - name: Optimization
    description: Right-size gateways before renewal, consolidate blades into Infinity bundles where
      eligible, and align license terms (1Y vs 3Y) with refresh cycles to capture multi-year discounts.
  - name: Accountability
    description: Security architecture owns license posture; finance owns renewal calendar; SOC owns
      consumption telemetry and ensures unused entitlements are surfaced before renewal.
maintainers:
