specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Check Point
providerId: checkpoint
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Security
  - Cybersecurity
  - Endpoint Security
  - Firewall
  - Network Security
  - Security
  - Threat Prevention
description: Check Point does not publish list pricing for its security products or APIs. Pricing is
  quoted via direct sales or authorized channel partners and varies by appliance, license type (term,
  perpetual, subscription), gateway throughput, and bundled blade selection. The APIs (Management,
  Gaia, CloudGuard, Identity Awareness, Harmony, Spark, Zero Touch, Threat Hunting, CloudGuard WAF) are
  included with the underlying product license — there is no separate public API plan. Customers use
  the Check Point User Center / Infinity Portal to consume APIs once their account is provisioned.
notes: No public pricing page is available. Tiers below are placeholders representing the typical
  Check Point commercial structure (channel-quoted) and should be replaced if Check Point publishes
  list pricing in the future.
sources:
  - https://www.checkpoint.com/
  - https://www.checkpoint.com/products/
  - https://partnerlocator.checkpoint.com/
plans:
  - id: checkpoint-channel-quoted
    name: Channel-Quoted License
    type: enterprise
    description: All Check Point commercial offerings are quoted by Check Point sales or an authorized
      reseller. APIs are bundled with the underlying product license (Quantum, CloudGuard, Harmony,
      Infinity).
    entries:
      - label: Product license
        name: product_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: API access
        name: api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with license
        userMultiplied: false
    elements:
      - name: Check Point Management API
      - name: Check Point Gaia API
      - name: Check Point CloudGuard API
      - name: Check Point Identity Awareness API
      - name: Check Point Spark Management API
      - name: Check Point Zero Touch API
      - name: Check Point Harmony Email API
      - name: Check Point Threat Hunting API
      - name: Check Point CloudGuard WAF API
      - name: Authorized partner support
      - name: Contractual SLA
maintainers:
