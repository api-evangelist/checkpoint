naftiko: 1.0.0-alpha2
info:
  label: Check Point Management API — NAT Rules
  description: 'Check Point Management API — NAT Rules. 1 operations. Lead operation: Show NAT rulebase. Self-contained Naftiko
    capability covering one Checkpoint business surface.'
  tags:
  - Checkpoint
  - NAT Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHECKPOINT_API_KEY: CHECKPOINT_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-nat-rules
    baseUri: https://{server}/web_api
    description: Check Point Management API — NAT Rules business capability. Self-contained, no shared references.
    resources:
    - name: show-nat-rulebase
      path: /show-nat-rulebase
      operations:
      - name: shownatrulebase
        method: POST
        description: Show NAT rulebase
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-chkp-sid
      value: '{{env.CHECKPOINT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: management-nat-rules-rest
    port: 8080
    description: REST adapter for Check Point Management API — NAT Rules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/show-nat-rulebase
      name: show-nat-rulebase
      description: REST surface for show-nat-rulebase.
      operations:
      - method: POST
        name: shownatrulebase
        description: Show NAT rulebase
        call: management-nat-rules.shownatrulebase
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-nat-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Check Point Management API — NAT Rules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: show-nat-rulebase
      description: Show NAT rulebase
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-nat-rules.shownatrulebase
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
