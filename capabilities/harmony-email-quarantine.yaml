naftiko: 1.0.0-alpha2
info:
  label: Check Point Harmony Email API — Quarantine
  description: 'Check Point Harmony Email API — Quarantine. 1 operations. Lead operation: List quarantined items. Self-contained
    Naftiko capability covering one Checkpoint business surface.'
  tags:
  - Checkpoint
  - Quarantine
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHECKPOINT_API_KEY: CHECKPOINT_API_KEY
capability:
  consumes:
  - type: http
    namespace: harmony-email-quarantine
    baseUri: https://smart-api.avanan.net/v2.0
    description: Check Point Harmony Email API — Quarantine business capability. Self-contained, no shared references.
    resources:
    - name: quarantine
      path: /quarantine
      operations:
      - name: listquarantine
        method: GET
        description: List quarantined items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CHECKPOINT_API_KEY}}'
  exposes:
  - type: rest
    namespace: harmony-email-quarantine-rest
    port: 8080
    description: REST adapter for Check Point Harmony Email API — Quarantine. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/quarantine
      name: quarantine
      description: REST surface for quarantine.
      operations:
      - method: GET
        name: listquarantine
        description: List quarantined items
        call: harmony-email-quarantine.listquarantine
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: harmony-email-quarantine-mcp
    port: 9090
    transport: http
    description: MCP adapter for Check Point Harmony Email API — Quarantine. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-quarantined-items
      description: List quarantined items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harmony-email-quarantine.listquarantine
      outputParameters:
      - type: object
        mapping: $.
