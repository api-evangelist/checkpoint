name: checkpoint-capabilities
description: >-
  Naftiko sandbox capabilities for the Check Point security platform across
  Smart-1 Management, Gaia, CloudGuard, Identity Awareness, and Harmony
  Email APIs. These capabilities support firewall policy automation, cloud
  security posture, identity-aware enforcement, and email security monitoring.
provider: checkpoint
version: '1.0'
capabilities:
  - id: checkpoint.management.login
    name: Login to management server
    description: Authenticate against the Smart-1 management server and obtain a session ID.
    operationId: login
    inputs:
      - name: user
        type: string
        required: true
      - name: password
        type: string
        required: true
      - name: domain
        type: string
        required: false
    outputs:
      - name: sid
        type: string
    tags: [management, auth]
  - id: checkpoint.management.publish
    name: Publish session changes
    description: Publish all uncommitted changes for the active session.
    operationId: publish
    inputs: []
    outputs: []
    tags: [management, sessions]
  - id: checkpoint.management.installPolicy
    name: Install policy
    description: Install a policy package on selected gateways.
    operationId: installPolicy
    inputs:
      - name: policyPackage
        type: string
        required: true
      - name: targets
        type: array
        required: false
    outputs:
      - name: task
        type: object
    tags: [management, policy]
  - id: checkpoint.hosts.add
    name: Add host object
    description: Add a host object with name and IP address.
    operationId: addHost
    inputs:
      - name: name
        type: string
        required: true
      - name: ipAddress
        type: string
        required: true
    outputs:
      - name: host
        type: object
    tags: [management, hosts]
  - id: checkpoint.access.addRule
    name: Add access rule
    description: Add an access control rule to a layer.
    operationId: addAccessRule
    inputs:
      - name: layer
        type: string
        required: true
      - name: position
        type: string
        required: true
      - name: source
        type: array
        required: false
      - name: destination
        type: array
        required: false
      - name: service
        type: array
        required: false
      - name: action
        type: string
        required: false
    outputs:
      - name: rule
        type: object
    tags: [management, access-rules]
  - id: checkpoint.cloudguard.cloudAccounts
    name: List cloud accounts
    description: List CloudGuard onboarded cloud accounts.
    operationId: listCloudAccounts
    inputs: []
    outputs:
      - name: accounts
        type: array
    tags: [cloudguard, posture]
  - id: checkpoint.cloudguard.findings
    name: List compliance findings
    description: List CloudGuard compliance findings across cloud accounts.
    operationId: listFindings
    inputs: []
    outputs:
      - name: findings
        type: array
    tags: [cloudguard, compliance]
  - id: checkpoint.identity.add
    name: Add identity
    description: Associate a user identity with an IP address for policy enforcement.
    operationId: addIdentity
    inputs:
      - name: ipAddress
        type: string
        required: true
      - name: user
        type: string
        required: true
      - name: sessionTimeout
        type: integer
        required: false
    outputs: []
    tags: [identity, awareness]
  - id: checkpoint.harmony.events
    name: List Harmony Email events
    description: List Harmony Email and Collaboration security events.
    operationId: listEvents
    inputs:
      - name: startDate
        type: string
        required: false
      - name: endDate
        type: string
        required: false
    outputs:
      - name: events
        type: array
    tags: [harmony, email]
